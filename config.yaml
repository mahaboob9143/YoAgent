# ============================================================
# InstaAgent — Runtime Configuration (Serverless Repost Mode)
# ============================================================

# ── Cloudinary Uploads ────────────────────────────────────────
image_server:
  use_cloudinary: true # Uploads to Cloudinary (free, stable public URL)

# ── Repost Agent ──────────────────────────────────────────────
# Scrapes images from public Islamic accounts and reposts them
# with a rewritten caption. Triggered by GitHub Actions via: main.py --repost
repost:
  enabled: true
  source_accounts:
    - softeningsayings            # Public IG accounts to scrape images from
  max_posts_to_check: 20          # How many recent posts to scan per run
  download_dir: media/reposts     # Local download directory (cleaned up automatically)
  add_credit_line: true           # Append "Via @softeningsayings 🤍" to caption

# ── Caption Generation ────────────────────────────────────────
caption:
  language: en_ar              # bilingual: English + Arabic
  max_hashtags: 25

  # Fallback templates used by the rule-based engine
  fallback_templates:
    - |
      سبحان الله — Glory be to Allah ☁️

      Every sunrise is a reminder of His mercy.
      Take a moment to reflect and be grateful.

      Save this as a reminder 📌

      {hashtags}
    - |
      الحمد لله — All praise belongs to Allah 🤍

      In every challenge, there is a hidden blessing.
      Trust in Allah's plan — He knows what we do not.

      Share with someone who needs this today 🤍

      {hashtags}
    - |
      اللَّهُ أَكْبَر — Allah is the Greatest ✨

      No matter what life brings, return to Him.
      He is the Most Merciful, the Most Compassionate.

      Tag a brother or sister ☁️

      {hashtags}
