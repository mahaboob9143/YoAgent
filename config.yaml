# ============================================================
# YoAgent — Runtime Configuration (YouTube Shorts Pipeline)
# ============================================================

# ── Scraping Source ───────────────────────────────────────────
# "instagram" or "youtube"
scrape_source: youtube

# ── Repost / Instagram Scraping ───────────────────────────────
repost:
  enabled: true              # Only relevant when scrape_source: instagram
  source_accounts:
    - softeningsayings          # Public IG accounts to scrape Reels from
  max_posts_to_check: 20        # How many recent posts to scan per run
  download_dir: media/reposts   # Local download directory (auto-cleaned after upload)
  is_ramadan: false             # Set true during Ramadan to allow Ramadan content
  add_credit_line: true         # Append "Via @softeningsayings 🤍" to description

# ── YouTube Scraping ──────────────────────────────────────────
youtube_scraper:
  source_urls:
    - "https://www.youtube.com/@muftishamail/shorts"
  max_videos_to_check: 20
  download_dir: media/reposts
  add_credit_line: true         # Will add channel name to description

# ── YouTube Upload ────────────────────────────────────────────
youtube:
  privacy_status: public        # public | unlisted | private
  category_id: 22               # 22 = People & Blogs (best fit for Islamic content)
  made_for_kids: false          # Required by YouTube policy — set true only if applicable

# ── Rate Limiting / Polite Scraping ──────────────────────────
# Randomized sleep ranges (seconds) to avoid bot detection and
# reduce the risk of IP rate-limiting or session invalidation.
rate_limits:
  # Delay before each yt-dlp video download (YouTube scraper)
  yt_pre_download_min: 15
  yt_pre_download_max: 45

  # Delay between iterating Instagram posts (instaloader)
  ig_post_iter_min: 4
  ig_post_iter_max: 10

  # Extra delay before downloading a selected Instagram Reel
  ig_pre_download_min: 6
  ig_pre_download_max: 15
