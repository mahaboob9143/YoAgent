name: YouTube Shorts Pipeline

on:
  schedule:
    # 0:45 AM UTC = 6:15 AM IST
    # 12:45 PM UTC = 6:15 PM IST
    - cron: '45 0,12 * * *'
  workflow_dispatch:   # Allows manual triggering from GitHub UI

# Prevent two runs overlapping if CI is slow
concurrency:
  group: yoagent-repost
  cancel-in-progress: false

jobs:
  upload-short:
    # ── Self-hosted runner ────────────────────────────────────────────────────
    # Runs on your own Windows PC instead of GitHub's cloud (Azure) servers.
    # Reason: GitHub-hosted runners use Microsoft Azure datacenter IPs which
    # YouTube blocks for video downloads. A home/residential IP is not blocked.
    #
    # One-time setup (~5 min):
    #   1. Go to: https://github.com/mahaboob9143/YoAgent/settings/actions/runners
    #   2. Click "New self-hosted runner" → Windows x64
    #   3. Run the PowerShell commands shown on that page on your PC
    #   4. Install as a Windows service so it auto-starts (shown in step 3 page)
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run YoAgent
        env:
          YOUTUBE_CLIENT_ID:       ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET:   ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN:   ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: |
          $delay = Get-Random -Minimum 5 -Maximum 30
          Write-Host "Sleeping for ${delay}s before starting..."
          Start-Sleep -Seconds $delay
          python main.py --repost

      - name: Commit Dedup Tracker (if changed)
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/reposted_ids.txt
          $changes = git status --porcelain
          if ($changes) {
            git commit -m "chore: update repost tracker"
            git push
          }
