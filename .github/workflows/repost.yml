name: YouTube Shorts Pipeline

on:
  schedule:
    # 0:45 AM UTC = 6:15 AM IST
    # 12:45 PM UTC = 6:15 PM IST
    - cron: '45 0,12 * * *'
  workflow_dispatch:   # Allows manual triggering from GitHub UI

# Prevent two runs overlapping if CI is slow
concurrency:
  group: yoagent-repost
  cancel-in-progress: false

jobs:
  upload-short:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Decode YouTube Cookies
        env:
          YOUTUBE_COOKIES_B64: ${{ secrets.YOUTUBE_COOKIES_B64 }}
        run: |
          if [ -n "$YOUTUBE_COOKIES_B64" ]; then
            echo "$YOUTUBE_COOKIES_B64" | base64 -d > /tmp/yt_cookies.txt
            echo "✅ YouTube cookies file decoded successfully."
          else
            echo "⚠️  YOUTUBE_COOKIES_B64 secret not set — downloads may fail on CI."
          fi

      - name: Run YoAgent
        env:
          IG_SESSION_ID:           ${{ secrets.IG_SESSION_ID }}
          IG_SCRAPE_USER:          ${{ secrets.IG_SCRAPE_USER }}
          YOUTUBE_CLIENT_ID:       ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET:   ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN:   ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          YOUTUBE_COOKIES_FILE:    /tmp/yt_cookies.txt
        run: |
          # Random delay (60–300 s) to avoid predictable bot patterns.
          # GitHub Actions runners share IP pools — jitter reduces fingerprinting.
          delay=$((RANDOM % 241 + 60))
          echo "Sleeping for ${delay}s before starting..."
          sleep $delay

          python main.py --repost

      - name: Commit Dedup Tracker (if changed)
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/reposted_ids.txt
          git diff --quiet && git diff --staged --quiet || \
            (git commit -m "chore: update repost tracker" && git push)
